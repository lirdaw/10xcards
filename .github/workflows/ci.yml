name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["**/*.md", "context/**"]
  pull_request:
    branches: [main]
    paths-ignore: ["**/*.md", "context/**"]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx astro sync
      - run: npm run lint
      - run: npm run build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      # The isolation suite drives the real endpoints against a real Postgres — the whole
      # point is that RLS is the only lock, so a mocked database would test nothing. The
      # Supabase CLI is already a devDependency, so `npm ci` above installed it.
      - name: Start local Supabase stack
        run: npx supabase start

      # The suite runs against the LOCAL stack, never the repository secrets: it signs up
      # throwaway accounts and asserts one cannot reach the other's rows. Point it at the
      # cloud project and it would create junk users in production.
      - name: Export local stack credentials
        run: |
          npx supabase status -o env | grep -E '^(API_URL|PUBLISHABLE_KEY)=' > status.env
          . ./status.env
          echo "SUPABASE_URL=$API_URL" >> "$GITHUB_ENV"
          echo "SUPABASE_KEY=$PUBLISHABLE_KEY" >> "$GITHUB_ENV"
          rm status.env

      - run: npm test

  deploy:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx astro sync
      - run: npm run build
      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.90.0"
          command: deploy
